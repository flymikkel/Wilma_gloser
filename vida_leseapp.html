            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }

        }
    </style>
</head>

        // --- ICONS ---
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;

        // Forenklet, fargerik enhjørning-SVG
        const UnicornIcon = ({ locked }) => (
            <svg width="48" height="48" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                {/* Horn */}
                <path d="M42 20 L48 4 L36 18 Z" fill={locked ? "#cbd5e1" : "#facc15"} />
                {/* Hode og nakke */}
                <path d="M36 18 C 36 18 20 20 16 30 C 12 40 14 50 14 50 L 24 50 C 24 50 26 42 30 40 C 34 38 44 42 44 42 C 44 42 48 30 36 18 Z" fill={locked ? "#94a3b8" : "#f472b6"} />

                {!locked && <circle cx="28" cy="28" r="2" fill="white" />}
                {/* Lås-ikon (hvis låst) */}

                    <g transform="translate(20, 24) scale(0.6)">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" fill="#475569" />
                        <path d="M7 11V7a5 5 0 0110 0v4" stroke="#475569" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                    </g>
                )}
            </svg>
        );

        // --- COMPONENTS ---

        // Helper: Highlight heart word parts
        const renderWordWithHighlight = (wordObj) => {
            if (wordObj.type === "lydrett" || !wordObj.heartPart) return wordObj.word;
            const parts = wordObj.word.split(wordObj.heartPart);
            if (parts.length === 2) {
                return <>{parts[0]}<span className="text-red-500">{wordObj.heartPart}</span>{parts[1]}</>;
            }
            return wordObj.word;
        };

        const Dashboard = ({ currentBlock, onStart }) => {
            const levels = Array.from({ length: 10 }, (_, i) => i + 1);

            return (
                <div className="min-h-screen flex flex-col items-center justify-between py-12 px-4 bg-gradient-to-b from-purple-50 to-pink-50 fade-in">

                        <h1 className="text-4xl md:text-5xl font-black text-purple-600 drop-shadow-sm">Enhjørningsskogen</h1>
                        <p className="text-lg text-purple-400 font-bold">Lås opp alle for å vinne!</p>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4 w-full max-w-3xl mb-12">
                        {levels.map(level => {
                            const isUnlocked = level < currentBlock;
                            const isCurrent = level === currentBlock;
                            const isLocked = level > currentBlock;

                            return (
                                <div key={level} className={`flex flex-col items-center justify-center p-4 rounded-3xl border-4 transition-all duration-300 ${isCurrent ? 'border-purple-400 bg-white shadow-xl transform scale-105 pulse' : isUnlocked ? 'border-pink-300 bg-pink-50 shadow-sm' : 'border-gray-200 bg-gray-100 opacity-80'}`}>
                                    <UnicornIcon locked={isLocked} />
                                    <span className={`mt-3 font-black text-lg ${isCurrent ? 'text-purple-600' : isUnlocked ? 'text-pink-500' : 'text-gray-400'}`}>
                                        Nivå {level}
                                    </span>
                                </div>
                            );
                        })}

                    <button 
                        onClick={onStart}
                        className="card-3d bg-gradient-to-b from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 text-white rounded-[2rem] px-10 py-6 shadow-xl flex items-center justify-center space-x-4 border-b-4 border-purple-800 w-full max-w-md"
                    >
                        <PlayIcon />
                        <span className="text-3xl font-black tracking-wide">
                            {currentBlock > 10 ? "Start på nytt!" : `Spill Nivå ${currentBlock}`}
                        </span>
                    </button>
                </div>
            );
        };

        const LearningPhase = ({ blockWords, onFinish }) => {
            const [index, setIndex] = useState(0);
            const currentWord = blockWords[index];

            const handleNext = () => {
                if (index < blockWords.length - 1) setIndex(index + 1);
                else onFinish();
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-between py-12 px-6 fade-in bg-blue-50">
                    <div className="w-full flex justify-between items-center px-4 max-w-md">
                        <span className="text-lg font-bold text-blue-400">Lær nye ord</span>
                        <span className="text-lg font-bold text-blue-400">{index + 1} / {blockWords.length}</span>
                    </div>

                    <div className="flex flex-col items-center space-y-12 w-full">
                        <h2 className="text-8xl md:text-9xl font-black tracking-widest text-gray-800 text-center" key={currentWord.id}>
                            {renderWordWithHighlight(currentWord)}
                        </h2>
                        
                        <div className="bg-white p-8 rounded-3xl shadow-md w-full max-w-md text-center border-2 border-blue-100">
                            <p className="text-3xl font-bold text-gray-700 leading-relaxed">
                                {currentWord.contextSentence.split('___').map((part, i, arr) => (
                                    <React.Fragment key={i}>
                                        {part}
                                        {i < arr.length - 1 && <span className="text-blue-600 border-b-4 border-blue-200">{currentWord.word}</span>}
                                    </React.Fragment>
                                ))}
                            </p>
                        </div>
                    </div>

                    <button 
                        onClick={handleNext}
                        className="card-3d bg-blue-500 text-white rounded-2xl w-full max-w-md py-6 text-3xl font-bold shadow-lg flex justify-center items-center space-x-2 border-b-4 border-blue-600"
                    >
                        <span>Neste</span>
                        <ArrowRightIcon />
                    </button>
                </div>
            );
        };

        const TrainingPhase = ({ blockWords, onFinish }) => {
            const [wordsQueue, setWordsQueue] = useState([...blockWords].sort(() => Math.random() - 0.5));
            const currentWord = wordsQueue[0];

            const handleSuccess = () => {
                const newQueue = wordsQueue.slice(1);
                if (newQueue.length === 0) onFinish();
                else setWordsQueue(newQueue);
            };

            const handleFail = () => {
                const newQueue = [...wordsQueue.slice(1), currentWord];
                setWordsQueue(newQueue);
            };

            if (!currentWord) return null;

            return (
                <div className="min-h-screen flex flex-col items-center justify-between py-12 px-6 fade-in bg-purple-50">
                    <div className="w-full flex justify-between items-center px-4 max-w-md">
                        <span className="text-lg font-bold text-purple-400">Trening</span>
                        <span className="text-lg font-bold text-purple-400">{blockWords.length - wordsQueue.length + 1} gjenstår</span>
                    </div>

                    <div className="flex-1 flex items-center justify-center w-full">
                        <div className="bg-white w-full max-w-md aspect-square rounded-[3rem] shadow-xl flex items-center justify-center border-4 border-purple-100 p-8" key={currentWord.id}>
                            <h2 className="text-8xl md:text-9xl font-black text-gray-800 text-center break-words w-full">
                                {currentWord.word}
                            </h2>
                        </div>
                    </div>

                    <div className="w-full max-w-md flex space-x-4">
                        <button 
                            onClick={handleFail}
                            className="card-3d flex-1 bg-white text-gray-600 border-2 border-gray-200 rounded-2xl py-6 text-2xl font-bold shadow-sm"
                        >
                            Øve mer
                        </button>
                        <button 
                            onClick={handleSuccess}
                            className="card-3d flex-1 bg-green-500 text-white rounded-2xl py-6 text-2xl font-bold shadow-lg flex justify-center items-center space-x-2 border-b-4 border-green-600"
                        >
                            <CheckIcon />
                            <span>Klarte det!</span>
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentPhase, setCurrentPhase] = useState('dashboard');
            const [currentBlockIndex, setCurrentBlockIndex] = useState(1);
            
            const blockWords = wordDatabase.filter(w => w.block === currentBlockIndex);

            const handleFinishLearning = () => setCurrentPhase('training');
            const handleFinishTraining = () => {
                if (currentBlockIndex <= 10) {
                    setCurrentBlockIndex(currentBlockIndex + 1);
                }
                setCurrentPhase('dashboard');
            };

            return (
                <div className="max-w-2xl mx-auto relative min-h-screen overflow-hidden bg-gray-50 shadow-2xl">
                    {currentPhase === 'dashboard' && (
                        <Dashboard currentBlock={currentBlockIndex} onStart={() => setCurrentPhase('learning')} />
                    )}
                    {currentPhase === 'learning' && (
                        <LearningPhase blockWords={blockWords} onFinish={handleFinishLearning} />
                    )}
                    {currentPhase === 'training' && (
                        <TrainingPhase blockWords={blockWords} onFinish={handleFinishTraining} />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
